name: Weekly Article Generation

on:
  # Sunday at 9 PM ET (Monday 01:00 UTC) — after US tournaments wrap
  schedule:
    - cron: '0 1 * * 1'

  # Also allow manual trigger for testing
  workflow_dispatch:
    inputs:
      tours:
        description: 'Tours to include (pga,dp,liv or all)'
        required: false
        default: 'all'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    name: Generate Weekly Article
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Step 1 — Score last week's picks
        run: python pipeline/score_picks.py

      - name: Step 2 — Fetch tournament data
        run: python pipeline/fetch_data.py --tours ${{ github.event.inputs.tours || 'all' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Step 3 — Fetch DataGolf course fit + rankings
        run: python pipeline/fetch_datagolf.py
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Step 4 — Verify facts (guardrail against hallucination)
        run: python pipeline/verify_facts.py

      - name: Step 5 — Generate article with Claude
        run: python pipeline/generate_article.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Step 6 — Create review PR
        run: python pipeline/create_pr.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Upload data artifacts (for debugging)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-data-${{ github.run_id }}
          path: data/
          retention-days: 7
